services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    image: cloudagent/backend:local
    container_name: cloudagent-backend
    restart: unless-stopped
    env_file:
      - path: ../cloud_agent/agent/.env.container.example
        required: true
      - path: ../cloud_agent/agent/.env.container
        required: false
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: "5000"
      BACKEND_RELOAD: "false"
      LANGGRAPH_CHECKPOINT_PATH: /app/data/langgraph_checkpoints.sqlite
    ports:
      - "5000:5000"
    volumes:
      - backend_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      milvus:
        condition: service_healthy
      neo4j:
        condition: service_healthy

volumes:
  backend_data:
