name: CloudAgent Enterprise CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r cloud_agent/agent/requirements.txt

      - name: Run pytest
        run: python -m pytest tests -q

      - name: Run static golden eval
        run: python cloud_agent/evals/run_eval.py --mode static

      - name: Run route golden eval
        run: python cloud_agent/evals/run_eval.py --mode route

      - name: Validate enterprise compose config
        run: docker compose -f infra/docker-compose.yml -f infra/docker-compose.enterprise.yml config --quiet
